<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI × MATH — MDM Math Maroc 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════ TOKENS ═══════ */
:root {
  --ink:#07080F; --navy:#0B0D1A; --white:#F7F6F1; --paper:#EFEDE5;
  --blue:#0047FF; --gold:#E8A020; --teal:#00B88A; --red:#FF2D55;
  --gray:#6E6E7E; --mist:#E8E6DE; --line:rgba(7,8,15,.08);
  --sans:'Space Grotesk',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --serif:'Libre Baskerville',serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;scroll-behavior:smooth;}
body{font-family:var(--sans);color:var(--ink);background:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ═══════ TYPOGRAPHY ═══════ */
h1{font-size:clamp(2rem,6vw,4.5rem);font-weight:700;letter-spacing:-.03em;line-height:1.05;}
h2{font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:600;letter-spacing:-.02em;line-height:1.15;}
h3{font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:600;letter-spacing:-.01em;}
p,.body-text{font-size:1rem;line-height:1.65;color:var(--gray);}
.mono{font-family:var(--mono);font-size:.85rem;}
.serif-i{font-family:var(--serif);font-style:italic;}

/* ═══════ LAYOUT ═══════ */
.screen{display:none;min-height:100vh;min-height:100dvh;padding:1.5rem;position:relative;}
.screen.active{display:flex;flex-direction:column;animation:fadeUp .5s var(--ease);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.container{max-width:900px;width:100%;margin:0 auto;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}}

/* ═══════ HUD ═══════ */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:none;padding:.75rem 1.5rem;background:rgba(11,13,26,.92);backdrop-filter:blur(12px);color:var(--white);font-family:var(--mono);font-size:.8rem;align-items:center;justify-content:space-between;}
#hud.show{display:flex;}
#hud .pts{color:var(--gold);font-weight:700;font-size:1rem;}
#hud .dots{display:flex;gap:6px;}
#hud .dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);transition:all .3s var(--ease);}
#hud .dot.done{background:var(--teal);border-color:var(--teal);}
#hud .dot.current{border-color:var(--gold);box-shadow:0 0 8px var(--gold);}
.hud-back{background:none;border:1px solid rgba(255,255,255,.2);color:var(--white);padding:4px 12px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:.75rem;transition:all .2s;}
.hud-back:hover{background:rgba(255,255,255,.1);}

/* ═══════ HERO ═══════ */
#hero{background:var(--navy);color:var(--white);justify-content:center;align-items:center;text-align:center;gap:1.5rem;}
#hero h1 span{color:var(--blue);}
#hero .sub{font-family:var(--mono);font-size:clamp(.75rem,2vw,1rem);color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;}
#hero .tagline{font-family:var(--serif);font-style:italic;font-size:clamp(1rem,2.5vw,1.3rem);color:rgba(255,255,255,.6);max-width:500px;}

/* ═══════ BUTTONS ═══════ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:8px;font-family:var(--sans);font-weight:600;font-size:1rem;cursor:pointer;border:none;transition:all .25s var(--ease);text-decoration:none;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,71,255,.35);}
.btn-dark{background:var(--ink);color:#fff;}
.btn-outline{background:transparent;border:2px solid var(--ink);color:var(--ink);}
.btn-outline:hover{background:var(--ink);color:var(--white);}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-sm{padding:8px 18px;font-size:.85rem;border-radius:6px;}

/* ═══════ REGISTER ═══════ */
#register{justify-content:center;align-items:center;text-align:center;gap:2rem;}
#register input{font-family:var(--mono);font-size:1.1rem;padding:14px 20px;border:2px solid var(--mist);border-radius:8px;width:min(100%,400px);text-align:center;transition:border .2s;}
#register input:focus{outline:none;border-color:var(--blue);}

/* ═══════ GRID ═══════ */
#grid{padding-top:5rem;}
.grid-title{text-align:center;margin-bottom:2.5rem;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;max-width:900px;margin:0 auto;}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all .3s var(--ease);position:relative;overflow:hidden;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.08);}
.card.completed{border-color:var(--teal);}
.card .num{font-family:var(--mono);font-size:.7rem;color:var(--gray);letter-spacing:.15em;text-transform:uppercase;}
.card .icon{font-size:2rem;margin:.5rem 0;}
.card h3{font-size:1rem;margin-bottom:.25rem;}
.card .concept{font-family:var(--mono);font-size:.7rem;color:var(--blue);margin-bottom:.5rem;}
.card .desc{font-size:.8rem;color:var(--gray);line-height:1.5;}
.card .pts-badge{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:.7rem;padding:3px 10px;border-radius:20px;background:var(--paper);color:var(--gray);}
.card.completed .pts-badge{background:var(--teal);color:#fff;}

/* ═══════ CHALLENGE SCREEN ═══════ */
.ch-screen{padding-top:5rem;}
.ch-header{text-align:center;margin-bottom:2rem;}
.ch-header .ch-num{font-family:var(--mono);font-size:.75rem;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;}
.ch-header .ch-icon{font-size:2.5rem;margin:.5rem 0;}
.question-box{background:var(--navy);color:var(--white);padding:2rem;border-radius:12px;font-family:var(--serif);font-style:italic;font-size:clamp(.95rem,2.5vw,1.15rem);line-height:1.7;margin-bottom:1.5rem;}
.question-box strong{color:var(--gold);font-style:normal;}

/* ═══════ HINT PILLS ═══════ */
.hints{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem;}
.hint-pill{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--paper);border:1px solid var(--mist);border-radius:8px;cursor:pointer;font-family:var(--mono);font-size:.8rem;color:var(--gray);transition:all .3s var(--ease);user-select:none;}
.hint-pill:hover{border-color:var(--blue);color:var(--ink);}
.hint-pill .hint-icon{font-size:1rem;}
.hint-content{display:none;padding:12px 16px;background:#fff;border:1px solid var(--mist);border-radius:0 0 8px 8px;margin-top:-1px;font-family:var(--mono);font-size:.82rem;line-height:1.6;animation:slideDown .3s var(--ease);}
.hint-content.show{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* ═══════ CHOICES ═══════ */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1.5rem 0;}
@media(max-width:500px){.choices{grid-template-columns:1fr;}}
.choice-btn{padding:14px 20px;border:2px solid var(--mist);border-radius:8px;background:#fff;font-family:var(--sans);font-size:.95rem;cursor:pointer;transition:all .2s var(--ease);text-align:left;}
.choice-btn:hover{border-color:var(--blue);background:rgba(0,71,255,.03);}
.choice-btn.selected{border-color:var(--blue);background:rgba(0,71,255,.06);}
.choice-btn.correct{border-color:var(--teal);background:rgba(0,184,138,.08);color:var(--teal);}
.choice-btn.wrong{border-color:var(--red);background:rgba(255,45,85,.06);color:var(--red);}

/* ═══════ PROOF BLOCK ═══════ */
.proof-block{background:var(--navy);color:var(--white);padding:1.5rem 2rem;border-radius:12px;font-family:var(--mono);font-size:.8rem;line-height:1.8;white-space:pre-wrap;margin:1.5rem 0;overflow-x:auto;}
.proof-block .qed{color:var(--gold);font-weight:700;}

/* ═══════ AI LINK ═══════ */
.ai-link{background:linear-gradient(135deg,rgba(0,71,255,.06),rgba(0,184,138,.06));border:1px solid rgba(0,71,255,.15);border-radius:12px;padding:1.5rem;margin:1rem 0;}
.ai-link .ai-label{font-family:var(--mono);font-size:.7rem;color:var(--blue);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;}
.ai-link p{font-size:.9rem;line-height:1.6;color:var(--ink);}

/* ═══════ CANVAS/INTERACTIVE ═══════ */
.canvas-wrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:1rem 0;position:relative;}
.canvas-wrap canvas{display:block;width:100%;height:auto;}

/* ═══════ SLIDER ═══════ */
.slider-row{display:flex;align-items:center;gap:1rem;margin:1rem 0;}
.slider-row label{font-family:var(--mono);font-size:.8rem;min-width:60px;}
.slider-row input[type=range]{flex:1;accent-color:var(--blue);}
.slider-row .val{font-family:var(--mono);font-size:.9rem;font-weight:700;min-width:50px;text-align:right;}

/* ═══════ SCORE TOAST ═══════ */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:1rem;z-index:200;animation:toastIn .5s var(--ease);pointer-events:none;}
.toast.good{background:var(--teal);color:#fff;}
.toast.bad{background:var(--red);color:#fff;}
.toast.info{background:var(--navy);color:var(--white);}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-20px);}100%{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ═══════ FINALE ═══════ */
#finale{background:var(--navy);color:var(--white);justify-content:center;align-items:center;text-align:center;gap:2rem;}
#finale .final-score{font-family:var(--mono);font-size:3rem;color:var(--gold);font-weight:700;}

/* ═══════ LEADERBOARD ═══════ */
#leaderboard{padding-top:5rem;}
.lb-table{width:100%;max-width:600px;margin:2rem auto;border-collapse:collapse;}
.lb-table th,.lb-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--line);}
.lb-table th{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);}
.lb-table .rank-1{color:var(--gold);font-weight:700;}

/* ═══════ RESPONSIVE ═══════ */
@media(max-width:600px){
  .screen{padding:1rem;}
  .question-box{padding:1.25rem;font-size:.9rem;}
  .proof-block{padding:1rem;font-size:.72rem;}
  .cards{grid-template-columns:1fr;}
  #hud{padding:.5rem 1rem;font-size:.7rem;}
}
</style>
</head>
<body>

<!-- ═══════ HUD ═══════ -->
<div id="hud">
  <button class="hud-back" onclick="nav('grid')">← Back</button>
  <div class="dots" id="hud-dots"></div>
  <div class="pts"><span id="hud-pts">0</span> pts</div>
</div>

<!-- ═══════ HERO ═══════ -->
<div class="screen active" id="hero">
  <div class="sub">MDM Math Maroc 2025</div>
  <h1>AI <span>×</span> MATH<br>= Fun</h1>
  <p class="tagline">8 enigmas. Real math. Real AI. Can you solve them all?</p>
  <button class="btn btn-primary" onclick="nav('register')">Start the Challenge →</button>
</div>

<!-- ═══════ REGISTER ═══════ -->
<div class="screen" id="register">
  <h2>Enter your name</h2>
  <p class="body-text">This goes on the leaderboard.</p>
  <input type="text" id="nameInput" placeholder="Your name" maxlength="20" autofocus>
  <button class="btn btn-dark" onclick="startGame()">Let's Go →</button>
</div>

<!-- ═══════ GRID ═══════ -->
<div class="screen" id="grid">
  <div class="grid-title">
    <h2>Choose Your Challenge</h2>
    <p class="body-text" id="grid-sub">0 / 8 completed · 0 pts</p>
  </div>
  <div class="cards" id="card-grid"></div>
  <div id="finale-preview" style="max-width:900px;margin:1.5rem auto 0;"></div>
  <div style="text-align:center;margin-top:2rem;">
    <button class="btn btn-gold" id="finale-btn" style="display:none;" onclick="nav('finale')">🏆 Grand Finale →</button>
  </div>
</div>

<!-- ═══════ 8 CHALLENGE SCREENS (generated by JS) ═══════ -->
<div id="challenge-screens"></div>

<!-- ═══════ FINALE ═══════ -->
<div class="screen" id="finale">
  <div class="sub">Grand Finale</div>
  <h1>Your Score</h1>
  <div class="final-score" id="final-score">0</div>
  <p class="tagline" id="finale-msg">Math saves lives.</p>
  <button class="btn btn-primary" onclick="nav('leaderboard')">See Leaderboard →</button>
</div>

<!-- ═══════ LEADERBOARD ═══════ -->
<div class="screen" id="leaderboard">
  <div class="container" style="text-align:center;">
    <h2>🏆 Leaderboard</h2>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Name</th><th>Score</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
    <button class="btn btn-outline" onclick="nav('hero')" style="margin-top:2rem;">Play Again</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   GAME ENGINE
═══════════════════════════════════════ */
const CARDS=[
  {key:'c1',num:'01',icon:'🍊',title:'The Vanishing Core',concept:'Curse of Dimensionality',desc:'Where do random points live in high dimensions?',pts:100,color:'#FF6B35'},
  {key:'c2',num:'02',icon:'🧪',title:'The Invisible Attack',concept:'Adversarial Examples',desc:'Compute the smallest invisible push that flips the model.',pts:110,color:'#0047FF'},
  {key:'c3',num:'03',icon:'🎯',title:'Beat the Neural Net',concept:'Overfitting',desc:'Can you draw a better boundary than AI?',pts:115,color:'#FF2D55'},
  {key:'c4',num:'04',icon:'👑',title:'Word Math Race',concept:'Word Vectors',desc:'King − Man + Woman = ?',pts:300,color:'#E8A020'},
  {key:'c5',num:'05',icon:'🚪',title:'The Monty Hall Trap',concept:"Bayes' Theorem",desc:'Should you switch doors?',pts:100,color:'#9B59B6'},
  {key:'c6',num:'06',icon:'⚡',title:'The Learning Rate Race',concept:'Finding the Minimum',desc:'Find the minimum with f\'(x)',pts:120,color:'#00B88A'},
  {key:'c7',num:'07',icon:'🔦',title:'The Attention Spotlight',concept:'How AI Reads',desc:'Which word does the AI focus on?',pts:150,color:'#0047FF'},
  {key:'c8',num:'08',icon:'💓',title:'Are You Smarter Than T-MECA?',concept:'ECG Classification',desc:'Can you beat 98.41% accuracy?',pts:120,color:'#FF2D55'},
];

let G={name:'',pts:0,done:{},scores:{},lb:[]};

function nav(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  const hud=document.getElementById('hud');
  if(['grid','finale','leaderboard','hero','register'].includes(id)){
    hud.classList.remove('show');
  } else {
    hud.classList.add('show');
  }
  if(id==='grid') renderGrid();
  if(id==='finale') showFinale();
  if(id==='leaderboard') showLB();
  window.scrollTo(0,0);
}

function startGame(){
  const n=document.getElementById('nameInput').value.trim();
  if(!n){toast('Enter your name!','bad');return;}
  G.name=n; G.pts=0; G.done={}; G.scores={};
  nav('grid');
}

function renderGrid(){
  const g=document.getElementById('card-grid');
  g.innerHTML='';
  let doneCount=0;
  CARDS.forEach(c=>{
    const isDone=G.done[c.key];
    if(isDone) doneCount++;
    const score=G.scores[c.key]||0;
    g.innerHTML+=`
      <div class="card ${isDone?'completed':''}" onclick="startChallenge('${c.key}')" style="border-left:3px solid ${c.color}">
        <div class="pts-badge">${isDone?score+' pts':'+'+c.pts+' pts'}</div>
        <div class="num">${c.num}</div>
        <div class="icon">${c.icon}</div>
        <h3>${c.title}</h3>
        <div class="concept">${c.concept}</div>
        <div class="desc">${c.desc}</div>
      </div>`;
  });
  document.getElementById('grid-sub').textContent=`${doneCount} / 8 completed · ${G.pts} pts`;
  document.getElementById('finale-btn').style.display=doneCount>=6?'inline-flex':'none';
  renderHudDots();
}

function renderHudDots(){
  const d=document.getElementById('hud-dots');
  d.innerHTML='';
  CARDS.forEach(c=>{
    d.innerHTML+=`<div class="dot ${G.done[c.key]?'done':''}"></div>`;
  });
  document.getElementById('hud-pts').textContent=G.pts;
}

function addPts(key,pts){
  G.scores[key]=pts;
  G.pts+=pts;
  G.done[key]=true;
  renderHudDots();
  toast(`+${pts} pts!`,'good');
}

function toast(msg,type='info'){
  const t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function showFinale(){
  document.getElementById('final-score').textContent=G.pts;
}
function showLB(){
  if(!G.lb.find(e=>e.name===G.name)) G.lb.push({name:G.name,score:G.pts});
  G.lb.sort((a,b)=>b.score-a.score);
  const b=document.getElementById('lb-body');
  b.innerHTML='';
  G.lb.forEach((e,i)=>{
    b.innerHTML+=`<tr class="${i===0?'rank-1':''}"><td>${i+1}</td><td>${e.name}</td><td>${e.score}</td></tr>`;
  });
}

/* ═══════════════════════════════════════
   CHALLENGE GENERATION
═══════════════════════════════════════ */
function startChallenge(key){
  nav(key);
  if(window['init_'+key]) window['init_'+key]();
}

function toggleHint(el){
  const content=el.nextElementSibling;
  content.classList.toggle('show');
}

function buildScreen(key,html){
  const wrap=document.createElement('div');
  wrap.className='screen ch-screen';
  wrap.id=key;
  wrap.innerHTML=html;
  document.getElementById('challenge-screens').appendChild(wrap);
}

/* ═══════════════════════════════════════
   CH1: THE VANISHING CORE
═══════════════════════════════════════ */
buildScreen('c1',`
<div class="container">
  <div class="ch-header">
    <div class="ch-num">Challenge 01</div>
    <div class="ch-icon">🍊</div>
    <h2>The Vanishing Core</h2>
  </div>
  <div class="question-box">
    Imagine a ball in <strong>d dimensions</strong>. Think of it like an orange: the <strong>skin</strong> is the outer layer (thickness ε), the <strong>core</strong> is everything inside.<br><br>
    Now generate a random point in the ball.<br>
    What is the probability that this point lands in the skin?<br>
    <strong>What happens to this probability as d → ∞?</strong>
  </div>
  <div class="hints">
    <div class="hint-pill" onclick="toggleHint(this)"><span class="hint-icon">💡</span> Hint 1</div>
    <div class="hint-content">The fraction of the ball that is "skin" equals: <strong>1 − (1 − ε)<sup>d</sup></strong></div>
    <div class="hint-pill" onclick="toggleHint(this)"><span class="hint-icon">💡</span> Hint 2</div>
    <div class="hint-content">Try computing the limit: <strong>lim<sub>d→∞</sub> (1 − ε)<sup>d</sup> = ?</strong> for any ε > 0.</div>
  </div>
  <div class="choices" id="c1-choices">
    <button class="choice-btn" onclick="c1_answer(this,0)">A) It goes to 0 — most points stay deep inside</button>
    <button class="choice-btn" onclick="c1_answer(this,1)">B) It stays around 0.5</button>
    <button class="choice-btn" onclick="c1_answer(this,2)">C) It goes to 0.99</button>
    <button class="choice-btn" onclick="c1_answer(this,3)">D) It goes to 1 — ALL points are near the boundary</button>
  </div>
  <div id="c1-viz" style="display:none;">
    <h3 style="margin:1rem 0 .5rem;">Watch it happen:</h3>
    <div class="canvas-wrap"><canvas id="c1-canvas" width="500" height="500"></canvas></div>
    <div style="display:flex;gap:1rem;align-items:center;margin:1rem 0;flex-wrap:wrap;">
      <span class="mono">d = <strong id="c1-dim">3</strong></span>
      <button class="btn btn-sm btn-outline" onclick="c1_increase()">Increase d →</button>
      <span class="mono" id="c1-skin-pct">3% in skin</span>
    </div>
  </div>
  <div id="c1-proof" style="display:none;">
    <div class="proof-block">Fix ε > 0. The "skin" of thickness ε is:
    {x ∈ Bᵈ : 1 − ε ≤ ‖x‖ ≤ 1}

Its probability mass is:
    P(R ≥ 1 − ε) = 1 − (1 − ε)^d

As d → ∞:
    (1 − ε)^d → 0

So:
    P(R ≥ 1 − ε) → 1

Thus, for large d, almost every point lies in the
outer shell of thickness ε. The core vanishes. <span class="qed">∎</span></div>
    <div class="ai-link">
      <div class="ai-label">🤖 AI Connection</div>
      <p>In 2012, a neural network called AlexNet processed images as vectors in 4096 dimensions. In that space, every image sits near the surface. Distance between a cat photo and a dog photo? Almost the same as between a cat and a car. This is why AI had to invent smarter ways to compare data.</p>
    </div>

function c1_draw(d){
  document.getElementById('c1-dim').textContent=d;
  const eps=0.01, skinPct=((1-Math.pow(1-eps,d))*100).toFixed(1);
  document.getElementById('c1-skin-pct').textContent=skinPct+'% in skin';
  const cv=document.getElementById('c1-canvas'), ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height, cx=W/2, cy=H/2, R=W*0.42;
  ctx.clearRect(0,0,W,H);
  // Draw ball
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle='rgba(0,71,255,.05)'; ctx.fill();
  ctx.strokeStyle='var(--mist)'; ctx.lineWidth=1; ctx.stroke();
  // Draw skin ring
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.arc(cx,cy,R*(1-eps),0,Math.PI*2,true);
  ctx.fillStyle='rgba(255,107,53,.12)'; ctx.fill();
  // Generate 100 points
  for(let i=0;i<100;i++){
    // Sample uniform in d-ball by sampling gaussian and normalizing, then scaling
    let coords=[];
    for(let j=0;j<d;j++) coords.push(gaussRand());
    let norm=Math.sqrt(coords.reduce((s,v)=>s+v*v,0));
    let u=Math.pow(Math.random(),1/d);
    let r=u; // radius in [0,1]
    // Project to 2D (first 2 coords)
    let px=(coords[0]/norm)*r, py=(coords[1]/norm)*r;
    let dist=Math.sqrt(px*px+py*py);
    let inSkin=r>=1-eps;
    ctx.beginPath();
    ctx.arc(cx+px*R, cy+py*R, 3, 0, Math.PI*2);
    ctx.fillStyle=inSkin?'rgba(255,107,53,.8)':'rgba(0,71,255,.6)';
    ctx.fill();
  }
  // Labels
  ctx.fillStyle=c1_dimIdx>=2?'var(--red)':'var(--gray)';
  ctx.font='600 14px "Space Grotesk"';
  ctx.textAlign='center';
  ctx.fillText('d = '+d, cx, cy+R+30);
}
function gaussRand(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

This moves x opposite to the slope.

If α is small:
    Each step is tiny → slow but converges.

If α is too large:
    Example: f(x) = x². f'(x) = 2x.

let c6={x:4,steps:0,alpha:.5,done:false,path:[]};
function c6_f(x){return x*x;}
function c6_fp(x){return 2*x;}
function c6_setAlpha(){c6.alpha=document.getElementById('c6-alpha').value/100;document.getElementById('c6-alpha-val').textContent=c6.alpha.toFixed(2);}
function c6_draw(){
  const cv=document.getElementById('c6-canvas'),ctx=cv.getContext('2d'),W=500,H=300;
  ctx.clearRect(0,0,W,H);
  // Draw f(x)=x^2, x in [-5,5], y in [0,25]
  ctx.beginPath();ctx.strokeStyle='var(--mist)';ctx.lineWidth=2;
  for(let px=0;px<W;px++){let x=(px/W)*10-5;let y=c6_f(x);let py=H-y*(H/25)-10;ctx.lineTo(px,py);}
  ctx.stroke();
  // Ball
  let bx=(c6.x+5)/10*W, by=H-c6_f(c6.x)*(H/25)-10;
  if(by<-50||by>H+50){ctx.fillStyle='var(--red)';ctx.font='700 20px "Space Grotesk"';ctx.textAlign='center';ctx.fillText('💥 DIVERGED!',W/2,H/2);return;}
  // Path
  if(c6.path.length>1){ctx.beginPath();ctx.strokeStyle='rgba(0,71,255,.3)';ctx.lineWidth=1;
    c6.path.forEach((p,i)=>{let px2=(p+5)/10*W,py2=H-c6_f(p)*(H/25)-10;i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);});ctx.stroke();}
  ctx.beginPath();ctx.arc(bx,by,8,0,Math.PI*2);ctx.fillStyle='var(--blue)';ctx.fill();
  ctx.fillStyle='var(--ink)';ctx.font='600 12px "Space Grotesk"';ctx.textAlign='center';ctx.fillText('f(x) = x²',W/2,20);
}
function c6_step(){
  if(c6.done)return;
  c6.path.push(c6.x);
  c6.x=c6.x-c6.alpha*c6_fp(c6.x);
  c6.steps++;
  c6_draw();
  const converged=Math.abs(c6.x)<0.1;
  const diverged=Math.abs(c6.x)>100;
  document.getElementById('c6-info').textContent=diverged?'💥 DIVERGED! Reset and try a smaller α.':`Steps: ${c6.steps} · x = ${c6.x.toFixed(2)} · f'(x) = ${c6_fp(c6.x).toFixed(2)}`;
  if(converged){document.getElementById('c6-done').style.display='inline-flex';toast('Converged! 🎯','good');}
}
function c6_reset(){c6={x:4,steps:0,alpha:c6.alpha,done:false,path:[]};c6_draw();
  document.getElementById('c6-info').textContent='Steps: 0 · x = 4.00 · f\'(x) = 8.00';
  document.getElementById('c6-done').style.display='none';}
function c6_finish(){
  if(c6.done)return;c6.done=true;
  const pts=Math.max(10,100-c6.steps*2);
  addPts('c6',pts);
  document.getElementById('c6-proof').style.display='block';
}
window.init_c6=function(){c6_reset();document.getElementById('c6-proof').style.display='none';c6_draw();};

    val=(val+2)/4; // normalize to 0-1
    const r=Math.round(val*80+100),g=Math.round((1-val)*150+50),b=Math.round(val*200+55);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(i*(S/N),j*(S/N),S/N,S/N);
  }
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='600 12px "Space Grotesk"';ctx.fillText(type===0?'GAF — Sample':'GAF — Sample',10,20);
}

let c8_answered=false,c8_locked=false,c8_choiceCorrect=false,c8_simTotal=0,c8_simWins=0;
window.c8_answer=function(btn,idx){
  if(c8_answered) return;
  c8_answered=true;
  c8_choiceCorrect=idx===2;
  document.querySelectorAll('#c8-choices .choice-btn').forEach((b,i)=>{
    if(i===2) b.classList.add('correct');
    else if(i===idx&&idx!==2) b.classList.add('wrong');
    b.style.pointerEvents='none';
  });
  document.getElementById('c8-evidence').style.display='block';
};
window.c8_simulate=function(batch){
  for(let i=0;i<batch;i++){
    let correct=0;
    if(Math.random()<0.7) correct++;
    if(Math.random()<0.7) correct++;
    if(Math.random()<0.7) correct++;
    if(correct>=2) c8_simWins++;
    c8_simTotal++;
  }
  const rate=c8_simWins/c8_simTotal;
  document.getElementById('c8-sim-stats').textContent=`Majority wins: ${c8_simWins} / ${c8_simTotal}`;
  document.getElementById('c8-sim-last').textContent=`Empirical probability ≈ ${rate.toFixed(3)}. The exact value is 0.784.`;
  document.getElementById('c8-finish').style.display='inline-flex';
};
window.c8_finish=function(){
  if(c8_locked) return;
  c8_locked=true;
  let pts=c8_choiceCorrect?100:35;
  if(c8_simTotal>=100 && Math.abs(c8_simWins/c8_simTotal-0.784)<0.06) pts+=20;
  addPts('c8',pts);
  document.getElementById('c8-proof').style.display='block';
};
window.init_c8=function(){
  c8_answered=false;
  c8_locked=false;
  c8_choiceCorrect=false;
  c8_simTotal=0;
  c8_simWins=0;
  document.getElementById('c8-evidence').style.display='none';
  document.getElementById('c8-proof').style.display='none';
  document.getElementById('c8-sim-stats').textContent='Majority wins: 0 / 0';
  document.getElementById('c8-sim-last').textContent='Run a simulation and compare it with the value 0.784.';
  document.getElementById('c8-finish').style.display='none';
  document.querySelectorAll('#c8-choices .choice-btn').forEach(b=>{b.className='choice-btn';b.style.pointerEvents='auto';});
};
